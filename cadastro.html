<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de paciente</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">
    <div class="auth-card">
        <div class="auth-header">
            <h1>BioSys</h1>
            <p>Crie sua conta de paciente</p>
        </div>

        <form id="form-cadastro">
            <div class="field">
                <label>Nome Completo</label>
                <input type="text" id="nome" placeholder="Ex: Rafael Moreira" required>
            </div>

            <div class="field">
                <label>CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
            </div>

            <div class="field">
                <label>Telefone</label>
                <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
            </div>

            <div class="field">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>

            <div class="field">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required>
            </div>

            <button type="submit" class="btn-auth">Cadastrar Agora</button>
        </form>

        <div class="auth-footer">
            Já tem uma conta? <a href="login.html">Fazer Login</a>
        </div>
    </div>
</body>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> 
    <script src="js/supabase.js"></script>
    <script src="js/cadastro.js"></script>


</body>
</html>
